name: Odds Snapshot

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: node snapshot.js
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
