name: Daily Update & Deploy

on:
  schedule:
    - cron: '0 2 * * *'   # UTC 2:00 = 北京时间 10:00
  workflow_dispatch:       # 允许手动触发

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Fetch latest ELO data
        run: python fetch_elo.py

      - name: Install Node dependencies
        run: npm ci

      - name: Run prediction update
        env:
          BSD_API_KEY: ${{ secrets.BSD_API_KEY }}
        run: node update.js

      - name: Deploy to EdgeOne Pages
        env:
          EDGEONE_API_TOKEN: ${{ secrets.EDGEONE_API_TOKEN }}
        run: |
          npx edgeone@latest pages deploy --token $EDGEONE_API_TOKEN --dir . --env production
