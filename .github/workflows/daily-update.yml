name: Daily Predict & Deploy to EdgeOne

on:
  schedule:
    - cron: '0 2 * * *'   # UTC 2:00 = 北京时间 10:00
  workflow_dispatch:       # 允许手动触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install soccerdata pandas

      - name: Fetch latest ELO data
        run: python scripts/fetch_elo.py

      - name: Install Node dependencies
        run: npm ci

      - name: Run prediction script
        env:
          BSD_API_KEY: ${{ secrets.BSD_API_KEY }}
        run: node scripts/dailyPredict.js

      - name: Deploy to EdgeOne Pages
        uses: edgeone-pages/actions@v1
        with:
          token: ${{ secrets.EDGEONE_API_TOKEN }}
          directory: './public'
          -0environment: 'production'
          
