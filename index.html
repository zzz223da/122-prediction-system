<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>122 足球预测 · 专业版</title>
    <style>
        /* 样式保持与之前一致，此处略，您直接复制之前完整的 index.html 样式部分即可 */
        /* 关键：确保卡片内概率和准确率显示的 CSS 无误 */
    </style>
</head>
<body class="light">
<div class="app">
    <div class="header">
        <h1>⚽ 122预测</h1>
        <div class="header-actions">
            <span id="darkToggle">🌙</span>
            <span id="refreshBtn">🔄</span>
            <span id="viewToggle">📋</span>
        </div>
    </div>

    <div id="homePage" class="page active">
        <div class="accuracy-panel" id="accuracyBanner" onclick="switchTab('accuracy')">
            <div class="accuracy-header">
                <span>📊 昨日准确率</span>
                <span id="accuracyTrend"></span>
            </div>
            <div style="display: flex; align-items: baseline; gap: 16px;">
                <div><span class="accuracy-value" id="yesterdayAccuracy">--</span><span>%</span></div>
                <div><span id="yesterdayCorrect">--</span>/<span id="yesterdayTotal">--</span> 场</div>
            </div>
            <div class="update-time" id="updateTime">数据更新于 --:--</div>
        </div>

        <div class="filter-bar">
            <select class="filter-select" id="leagueFilter"><option value="all">全部联赛</option></select>
            <select class="filter-select" id="sortSelect">
                <option value="time">按时间</option>
                <option value="league">按联赛</option>
                <option value="value">高价值优先</option>
            </select>
            <button class="filter-btn" id="highValueFilter">🔥 只看高价值</button>
        </div>

        <div class="favorites-section" id="favoritesSection" style="display:none;">
            <div class="league-title">⭐ 我的收藏</div>
            <div id="favoritesList"></div>
        </div>

        <div id="matchesList"></div>
        <div class="loading" id="loadingIndicator">加载数据中...</div>
    </div>

    <div id="accuracyPage" class="page">
        <div class="accuracy-panel">
            <div class="accuracy-header">
                <span>📈 近期准确率趋势</span>
                <span id="avgAccuracy">--</span>
            </div>
            <canvas id="accuracyChart" width="400" height="200"></canvas>
        </div>
    </div>

    <div class="tab-bar">
        <div class="tab-item active" data-tab="home"><span class="icon">🏠</span><span>首页</span></div>
        <div class="tab-item" data-tab="accuracy"><span class="icon">📊</span><span>准确率</span></div>
    </div>
</div>

<script>
    // ========== 核心修复：准确率读取 ==========
    async function loadAccuracy() {
        try {
            const res = await fetch('accuracy.json');
            accuracyData = await res.json();
        } catch (e) {
            accuracyData = { history: [] };
        }
    }

    function renderAccuracyBanner() {
        if (!accuracyData || !accuracyData.history || accuracyData.history.length === 0) {
            document.getElementById('yesterdayAccuracy').innerText = '--';
            document.getElementById('yesterdayCorrect').innerText = '--';
            document.getElementById('yesterdayTotal').innerText = '--';
            return;
        }
        const latest = accuracyData.history[accuracyData.history.length - 1];
        document.getElementById('yesterdayAccuracy').innerText = (latest.accuracy || 0).toFixed(1);
        document.getElementById('yesterdayCorrect').innerText = latest.correct || 0;
        document.getElementById('yesterdayTotal').innerText = latest.total || 0;
    }

    // ========== 核心修复：比赛卡片渲染（确保读取 finalProbs） ==========
    function renderMatchCard(m) {
        const p = m.finalProbs || { home: 0.33, draw: 0.34, away: 0.33 };
        const ou = m.overUnder || { over: 0.5, under: 0.5 };
        return `
        <div class="card">
            <div class="card-header">
                <span class="teams">${m.homeTeam} vs ${m.awayTeam}</span>
            </div>
            <div class="meta-row">
                <span>🕐 ${m.date}</span>
                <span>🏆 ${m.league}</span>
                <span>📊 ELO: ${m.homeElo} vs ${m.awayElo}</span>
            </div>
            <div class="prob-row">
                <span>胜平负</span>
                <div>
                    <span class="home">${(p.home * 100).toFixed(1)}%</span>
                    <span class="draw">${(p.draw * 100).toFixed(1)}%</span>
                    <span class="away">${(p.away * 100).toFixed(1)}%</span>
                </div>
            </div>
            <div class="prob-row">
                <span>大小球(2.5)</span>
                <div>
                    <span class="ou">大 ${(ou.over * 100).toFixed(1)}%</span>
                    <span class="ou">小 ${(ou.under * 100).toFixed(1)}%</span>
                </div>
            </div>
            <div>最可能比分: ${m.bestScore || '--'}</div>
        </div>
        `;
    }

    // 其余函数（筛选、收藏、深色模式等）保持不变，但确保 init 调用顺序正确
    async function init() {
        await loadData();
        await loadAccuracy();
        renderAll();
    }

    init();
</script>
</body>
</html>
