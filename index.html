<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>122 足球预测 · 专业版</title>
    <style>
        /* 你的样式代码保持不变，这里省略，请粘贴你之前提供的完整 style */
        :root { --bg: #f5f7fa; --card-bg: #ffffff; --text-primary: #1e293b; --text-secondary: #64748b; --border: #eef2f6; --accent: #3b82f6; --success: #059669; --warning: #d97706; --danger: #dc2626; --ou: #7c3aed; }
        .dark { --bg: #0f172a; --card-bg: #1e293b; --text-primary: #f1f5f9; --text-secondary: #94a3b8; --border: #334155; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text-primary); padding: 16px; max-width: 500px; margin: 0 auto; padding-bottom: 80px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { font-size: 24px; font-weight: 700; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 16px; margin-bottom: 12px; border: 1px solid var(--border); }
        .teams { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
        .meta { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; }
        .prob-row { display: flex; justify-content: space-between; margin: 8px 0; }
        .prob-label { color: var(--text-secondary); font-size: 13px; }
        .prob-values { display: flex; gap: 12px; }
        .prob-value { font-weight: 700; }
        .home { color: var(--success); } .draw { color: var(--warning); } .away { color: var(--danger); }
        .bsd-probs { font-size: 12px; color: var(--text-secondary); margin-top: 4px; border-top: 1px dashed var(--border); padding-top: 8px; }
        .filter-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
        .filter-select, .filter-btn { padding: 8px 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--card-bg); color: var(--text-primary); }
        .loading { text-align: center; padding: 40px; color: var(--text-secondary); }
        .update-time { font-size: 12px; color: var(--text-secondary); text-align: center; margin-top: 8px; }
        .league-title { font-size: 18px; font-weight: 700; margin: 20px 0 12px; padding-left: 10px; border-left: 4px solid var(--accent); }
    </style>
</head>
<body class="light">
<div class="app">
    <div class="header">
        <h1>⚽ 122预测</h1>
        <div style="display: flex; gap: 8px;">
            <button id="darkToggle" style="background:var(--card-bg); border:1px solid var(--border); border-radius:20px; padding:6px 12px; cursor:pointer;">🌙</button>
            <button id="refreshBtn" style="background:var(--accent); color:#fff; border:none; border-radius:20px; padding:6px 12px; cursor:pointer;">🔄</button>
        </div>
    </div>

    <div id="homePage">
        <div class="filter-bar">
            <select id="leagueFilter" class="filter-select">
                <option value="all">全部联赛</option>
            </select>
            <select id="sortSelect" class="filter-select">
                <option value="time">按时间</option>
                <option value="league">按联赛</option>
            </select>
            <button id="highValueFilter" class="filter-btn">🔥 只看高价值</button>
        </div>
        <div id="matchesContainer"></div>
        <div id="loadingIndicator" class="loading">加载数据中...</div>
        <div class="update-time" id="updateTime"></div>
    </div>
</div>

<script>
    let appData = null;
    let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');

    async function loadData() {
        try {
            const res = await fetch('data.json');
            if (!res.ok) throw new Error('数据加载失败');
            appData = await res.json();
            document.getElementById('updateTime').innerText = `数据更新于 ${new Date().toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'})}`;
            renderAll();
        } catch (e) {
            document.getElementById('loadingIndicator').innerText = '数据加载失败，请稍后刷新';
        }
    }

    function renderAll() {
        if (!appData || !appData.matches || appData.matches.length === 0) {
            document.getElementById('loadingIndicator').innerText = '今日暂无比赛';
            return;
        }
        document.getElementById('loadingIndicator').style.display = 'none';
        updateLeagueFilter();
        renderMatches();
    }

    function updateLeagueFilter() {
        const leagues = [...new Set(appData.matches.map(m => m.league))];
        const select = document.getElementById('leagueFilter');
        select.innerHTML = '<option value="all">全部联赛</option>';
        leagues.forEach(l => {
            const opt = document.createElement('option');
            opt.value = l; opt.innerText = l;
            select.appendChild(opt);
        });
    }

    function renderMatches() {
        const leagueFilter = document.getElementById('leagueFilter').value;
        const highValueOnly = document.getElementById('highValueFilter').classList.contains('active');
        const sortBy = document.getElementById('sortSelect').value;

        let matches = appData.matches.filter(m => {
            if (leagueFilter !== 'all' && m.league !== leagueFilter) return false;
            if (highValueOnly && !m.isHighValue) return false;
            return true;
        });

        if (sortBy === 'time') matches.sort((a,b) => new Date(a.date) - new Date(b.date));
        else if (sortBy === 'league') matches.sort((a,b) => a.league.localeCompare(b.league));

        const grouped = {};
        matches.forEach(m => {
            const league = m.league || '其他';
            if (!grouped[league]) grouped[league] = [];
            grouped[league].push(m);
        });

        let html = '';
        for (const league in grouped) {
            html += `<div class="league-title">${league}</div>`;
            grouped[league].forEach(m => html += renderMatchCard(m));
        }
        document.getElementById('matchesContainer').innerHTML = html || '<div class="loading">无匹配比赛</div>';
    }

    function renderMatchCard(m) {
        const my = m.myProbs || { home:0.33, draw:0.34, away:0.33 };
        const bsd = m.bsdProbs;
        return `
        <div class="card">
            <div class="teams">${m.homeTeam} vs ${m.awayTeam}</div>
            <div class="meta">${m.date} · ${m.league} · ELO: ${m.homeElo} vs ${m.awayElo}</div>
            <div class="prob-row">
                <span class="prob-label">我的预测</span>
                <div class="prob-values">
                    <span class="prob-value home">${(my.home*100).toFixed(1)}%</span>
                    <span class="prob-value draw">${(my.draw*100).toFixed(1)}%</span>
                    <span class="prob-value away">${(my.away*100).toFixed(1)}%</span>
                </div>
            </div>
            ${bsd ? `
            <div class="bsd-probs">
                <span>BSD预测：</span>
                <span style="color:var(--success);">${(bsd.home*100).toFixed(1)}%</span> /
                <span style="color:var(--warning);">${(bsd.draw*100).toFixed(1)}%</span> /
                <span style="color:var(--danger);">${(bsd.away*100).toFixed(1)}%</span>
                ${bsd.mostLikelyScore ? ` · 最可能比分 ${bsd.mostLikelyScore}` : ''}
            </div>
            ` : ''}
            <div style="font-size:13px; margin-top:8px;">最可能比分: ${my.bestScore || '--'}</div>
            ${m.isHighValue ? '<div style="color:#f59e0b; margin-top:6px;">🔥 高价值关注</div>' : ''}
        </div>
        `;
    }

    document.getElementById('darkToggle').addEventListener('click', () => {
        document.body.classList.toggle('dark');
        document.getElementById('darkToggle').innerText = document.body.classList.contains('dark') ? '☀️' : '🌙';
    });

    document.getElementById('refreshBtn').addEventListener('click', () => location.reload(true));

    document.getElementById('leagueFilter').addEventListener('change', renderMatches);
    document.getElementById('sortSelect').addEventListener('change', renderMatches);
    document.getElementById('highValueFilter').addEventListener('click', function() {
        this.classList.toggle('active');
        renderMatches();
    });

    loadData();
</script>
</body>
</html>
